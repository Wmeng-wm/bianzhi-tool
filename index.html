<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>编织工艺计算器</title>
<style>
:root{--bg:#f6f8fc;--card:#fff;--line:#e5eaf2;--text:#0f172a;--muted:#64748b;--pri:#22c55e;--pri2:#16a34a}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#f6f8fc,#eef3f9);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text)}
.wrap{max-width:980px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.out{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
@media (max-width:700px){.grid,.out{grid-template-columns:1fr}}
input,select,textarea{width:100%;padding:13px 14px;border-radius:14px;border:1px solid #d7dee8;background:#fff;color:var(--text);font-size:16px}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}.row{display:flex;gap:10px;flex-wrap:wrap}
.btn,.btn2,.btn3{border:none;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:700}.btn{background:linear-gradient(180deg,var(--pri),var(--pri2));color:#06110a}.btn2{background:#eef2f7}.btn3{background:#fff;border:1px solid #d7dee8}
.kpi{background:#fff;border:1px solid #e5eaf2;border-radius:18px;padding:14px}.kpi .t{font-size:12px;color:var(--muted)}.kpi .v{font-size:28px;font-weight:900}.kpi .s{font-size:12px;color:#2563eb;margin-top:6px}
textarea{min-height:180px}
.auth-wrap{position:fixed;inset:0;background:linear-gradient(180deg,#f6f8fc,#eef3f9);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
.auth-card{max-width:460px;width:100%;background:#fff;border:1px solid #e5eaf2;border-radius:20px;padding:22px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
.auth-title{font-size:28px;font-weight:800;margin-bottom:8px}.auth-sub{color:#64748b;font-size:14px;line-height:1.8;margin-bottom:14px}.auth-tip{font-size:12px;color:#64748b;margin-top:10px}
.footer-note{color:#64748b;font-size:12px;text-align:center;padding:8px 0 24px}
</style>
</head>
<body>
<div id="authGate" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">编织工艺计算器</div>
    <div class="auth-sub">请输入授权码后使用。授权通过后，本机将自动记住 365 天。</div>
    <label>授权码</label>
    <input id="authCode" type="password" placeholder="请输入授权码">
    <div style="height:12px"></div>
    <div class="row"><button class="btn" style="width:100%" id="authBtn">进入工具</button></div>
    <div id="authMsg" class="auth-tip">仅授权用户可使用，未经允许禁止外传。</div>
  </div>
</div>

<div class="wrap">
  <div class="card"><h1 style="margin:0 0 6px">编织工艺计算器</h1><div style="color:#64748b">已更新至V2.4.5，修正部分错误。</div></div>
  <div class="card">
    <div class="grid">
      <div><label>锭数</label><input id="spindles" type="number" value="24"></div>
      <div><label>工艺</label><select id="craft"><option value="1x1">一压一</option><option value="1x2" selected>一压二</option><option value="2x2">二压二</option></select></div>
      <div><label>芯棒直径 D（mm）</label><input id="mandrel" type="number" step="0.001" value="1.25"></div>
      <div><label>丝径 d（mm）</label><input id="wire" type="number" step="0.001" value="0.127"></div>
      <div><label>PPI（每英寸编织点）</label><input id="ppi" type="number" step="0.01" value="35"></div>
      <div><label>成品长度（mm）</label><input id="length" type="number" step="0.1" value="1000"></div>
    </div>
    <div style="height:12px"></div>
    <div class="row">
      <button class="btn" id="calcBtn">计算</button>
      <button class="btn2" id="copyCustomerBtn">复制给客户</button>
      <button class="btn2" id="copyEngineerBtn">复制工程版</button>
    </div>
  </div>
  <div class="card">
    <div class="out">
      <div class="kpi"><div class="t">用丝比</div><div class="v" id="ratio">-</div><div class="s">按编织角计算</div></div>
      <div class="kpi"><div class="t">编织角</div><div class="v" id="angle">-</div><div class="s">真实锭数</div></div>
      <div class="kpi"><div class="t">覆盖率（参考）</div><div class="v" id="cover">-</div><div class="s">辅助判断</div></div>
      <div class="kpi"><div class="t">每米单股理论用丝</div><div class="v" id="perMeter">-</div><div class="s">单股/1000mm</div></div>
      <div class="kpi"><div class="t">单股总用丝</div><div class="v" id="single">-</div><div class="s">按长度计算</div></div>
      <div class="kpi"><div class="t">机台总用丝</div><div class="v" id="total">-</div><div class="s">全部锭总和</div></div>
    </div>
  </div>
  <div class="card"><textarea id="preview"></textarea></div>
</div>
<div class="footer-note">© 恒辉王萌编织工艺工具｜仅授权用户内部使用，未经允许禁止外传。</div>

<script>
(function(){
const AUTH_CODES = {
  "WM-NEIBU-001": {name:"内部", days:365},
  "WM-VIP-001": {name:"VIP", days:365}
};
const AUTH_KEY = "braid_tool_auth_v245";

function $(id){ return document.getElementById(id); }
function craftText(c){return c==='1x1'?'一压一':c==='1x2'?'一压二':'二压二'}
function set(id,val){ $(id).textContent = val; }
function v(id){ return parseFloat($(id).value || 0); }

function hasValidAccess(){
  try{
    const raw = localStorage.getItem(AUTH_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    return data && data.expireAt && Date.now() < data.expireAt;
  }catch(e){ return false; }
}
function saveAccess(code){
  const cfg = AUTH_CODES[code];
  const expireAt = Date.now() + (cfg.days||365)*24*60*60*1000;
  localStorage.setItem(AUTH_KEY, JSON.stringify({code, name:cfg.name, expireAt}));
}
function verifyAccess(){
  const code = (($('authCode').value)||'').trim();
  if(AUTH_CODES[code]){
    saveAccess(code);
    $('authGate').style.display='none';
    $('authMsg').textContent='授权成功';
    alert('授权成功');
  }else{
    $('authMsg').textContent='授权码错误，请重新输入';
    alert('授权码错误');
  }
}
function initAccess(){ if(hasValidAccess()) $('authGate').style.display='none'; }

function braidAngleLocked(D, ppi, sp){
  let tanA = (Math.PI * D * ppi) / (25.4 * sp);
  return Math.atan(tanA) * 180 / Math.PI;
}
function stableRatio(sp,D,ppi,craft){
  let angle = braidAngleLocked(D, ppi, sp) * Math.PI / 180;
  return 1 / Math.cos(angle);
}
function coverRate(sp,D,d,angleDeg){
  const C=Math.PI*(D+d); const angle=angleDeg*Math.PI/180;
  if(C<=0||d<=0||angle<=0) return 0;
  const eff=sp*d/Math.sin(angle);
  return Math.min(99.9,Math.max(0,eff/C*100));
}
function buildPreview(mode){
  const sp=v('spindles'),D=v('mandrel'),d=v('wire'),ppi=v('ppi'),len=v('length'),craft=craftText($('craft').value);
  const ratio=$('ratio').textContent, angle=$('angle').textContent, cover=$('cover').textContent;
  const single=$('single').textContent, total=$('total').textContent;
  $('preview').value = mode==='engineer' ? `【编织工艺工程计算】\n工艺：${craft}\n锭数：${sp}锭\n芯棒直径：${D.toFixed(3)} mm\n丝径：${d.toFixed(3)} mm\nPPI：${ppi}\n成品长度：${len} mm\n\n正算结果：\n1、用丝比：${ratio}\n2、编织角：${angle}\n3、覆盖率：${cover}\n4、每米单股理论用丝：${$('perMeter').textContent}\n5、单股理论总用丝：${single}\n6、机台理论总用丝：${total}` :
`【编织工艺参数参考】\n工艺：${craft}\n锭数：${sp}锭\n芯棒直径：${D.toFixed(3)} mm\n丝径：${d.toFixed(3)} mm\nPPI：${ppi}\n成品长度：${len} mm\n\n计算结果（按单股）：\n1、用丝比：${ratio}\n2、单股理论用丝：${single}\n3、机台理论总用丝：${total}\n4、编织角：${angle}\n5、覆盖率（参考）：${cover}`;
}
function calc(){
  const sp=v('spindles'),D=v('mandrel'),d=v('wire'),ppi=v('ppi'),len=v('length'),craft=$('craft').value;
  const ratio=stableRatio(sp,D,ppi,craft);
  const angle=braidAngleLocked(D,ppi,sp);
  const cover=coverRate(sp,D,d,angle);
  const single=ratio*len,total=single*sp,perMeter=ratio*1000;
  set('ratio',ratio.toFixed(3)); set('angle',angle.toFixed(1)+'°'); set('cover',cover.toFixed(1)+'%');
  set('single',single.toFixed(1)+' mm'); set('total',total.toFixed(1)+' mm'); set('perMeter',perMeter.toFixed(0)+' mm');
  buildPreview('customer');
}
async function copyText(t){
  const finalText = (t || '') + "\n\n—— 数据由恒辉王萌编织工艺工具生成";
  try{ await navigator.clipboard.writeText(finalText); alert('已复制'); }
  catch(e){ $('preview').value=finalText; $('preview').select(); document.execCommand('copy'); alert('已复制'); }
}
function copyCustomer(){ calc(); buildPreview('customer'); copyText($('preview').value); }
function copyEngineer(){ calc(); buildPreview('engineer'); copyText($('preview').value); }

$('authBtn').addEventListener('click', verifyAccess);
$('calcBtn').addEventListener('click', calc);
$('copyCustomerBtn').addEventListener('click', copyCustomer);
$('copyEngineerBtn').addEventListener('click', copyEngineer);
$('authCode').addEventListener('keydown', function(e){ if(e.key==='Enter') verifyAccess(); });

initAccess(); calc();
})();
</script>
</body>
</html>
