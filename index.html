<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>编织工艺计算器</title>
<style>
:root{
  --bg:#f3f6fb; 
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --pri:#22c55e;
  --pri-hover:#16a34a;
}
*{box-sizing:border-box} 
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; -webkit-font-smoothing: antialiased;}
.wrap{max-width:980px;margin:0 auto;padding:20px 12px}

/* 卡片弥散阴影高级感 */
.card{background:var(--card);border-radius:24px;padding:24px 20px;margin-bottom:16px;box-shadow:0 8px 30px rgba(15,23,42,0.04);border:none;}

/* 【核心修改】：去掉了手机端的折叠代码，强制全局一行两个 */
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.out{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}

/* 输入框微光与拟物交互，微调了手机端并排时的内边距 */
input,select,textarea{width:100%;padding:12px 12px;border-radius:14px;background:#f8fafc;border:2px solid transparent;color:var(--text);font-size:15px;font-weight:500;transition:all 0.25s ease;}
input:focus,select:focus,textarea:focus{outline:none;background:#fff;border-color:var(--pri);box-shadow:0 0 0 4px rgba(34,197,94,0.12);}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;}

/* 三大联动框的色彩暗示 */
#ppi {background: #fffbeb;} #ppi:focus {border-color: #fbd38d; box-shadow: 0 0 0 4px rgba(251,211,141,0.15);}
#pitchIn {background: #f0fdf4;} #pitchIn:focus {border-color: #4ade80; box-shadow: 0 0 0 4px rgba(74,222,128,0.15);}
#angleIn {background: #f0f9ff;} #angleIn:focus {border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56,189,248,0.15);}

.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
.btn,.btn2{border:none;border-radius:14px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s ease;}
.btn{background:var(--pri);color:#fff;box-shadow:0 4px 12px rgba(34,197,94,0.25);}.btn:hover{background:var(--pri-hover);transform:translateY(-1px);box-shadow:0 6px 16px rgba(34,197,94,0.3);}
.btn2{background:#f1f5f9;color:#334155;}.btn2:hover{background:#e2e8f0;transform:translateY(-1px);}

/* 结果大屏卡片交互动效 */
.kpi{background:#f8fafc;border-radius:18px;padding:16px;transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);border:1px solid rgba(0,0,0,0.02);}
.kpi:hover{transform:translateY(-3px);box-shadow:0 12px 24px rgba(15,23,42,0.06);background:#fff;}
.kpi .t{font-size:12px;color:var(--muted);font-weight:500;}
.kpi .v{font-size:24px;font-weight:900;margin:6px 0;letter-spacing:-0.5px;}
.kpi .s{font-size:11px;color:#3b82f6;}

/* 核心主结果专属高亮涂装 */
.kpi-primary {background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); border: 1px solid #bbf7d0;}
.kpi-primary:hover {background: linear-gradient(135deg, #ecfdf3 0%, #d1fae5 100%);}
.kpi-primary .t {color: #166534;}
.kpi-primary .v {color: #14532d;}
.kpi-primary .s {color: #059669;}

textarea{min-height:200px; line-height: 1.6; font-size: 15px;}
.footer-note{color:#94a3b8;font-size:13px;text-align:center;padding:10px 0 30px; font-weight: 500;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" style="padding-bottom: 20px;">
    <h1 style="margin:0 0 8px; font-size:24px; letter-spacing:-0.5px;">编织工艺计算器</h1>
    <div style="color:#64748b; line-height: 1.6; font-size:13px;">
      V3.1 版本，优化各项功能。<br> <span style="color:#3b82f6; font-weight: 600;">WM开发</span>
    </div>
  </div>

  <div class="card">
    <div class="grid">
      <div><label>锭数 (Spindles)</label><input id="spindles" type="number" value="144" oninput="sync('ppi')"></div>
      <div><label>工艺结构 (Craft)</label><select id="craft" onchange="sync('ppi')"><option value="1x1">一压一 (1x1)</option><option value="1x2" selected>一压二 (1x2)</option><option value="2x2">二压二 (2x2)</option></select></div>
      <div><label>芯棒直径 D (mm)</label><input id="mandrel" type="number" step="0.001" value="8" oninput="sync('ppi')"></div>
      <div><label>丝径 d (mm)</label><input id="wire" type="number" step="0.001" value="0.03"></div>
      
      <div><label>目数 PPI (联动输入)</label><input id="ppi" type="number" step="0.01" value="55" oninput="sync('ppi')"></div>
      <div><label>节距 Pitch (mm) (联动输入)</label><input id="pitchIn" type="number" step="0.01" value="" oninput="sync('pitch')"></div>
      <div><label>编织夹角 (°) (联动输入)</label><input id="angleIn" type="number" step="0.01" value="" oninput="sync('angle')"></div>
      <div><label>成品长度 (mm)</label><input id="length" type="number" step="0.1" value="400000"></div>
    </div>
    
    <div style="height:8px"></div>
    <div class="row">
      <button class="btn" onclick="calc()">立即计算</button>
      <button class="btn2" onclick="copyCustomer()">一键复制并生成报告</button>
    </div>
  </div>

  <div class="card">
    <div class="out">
      <div class="kpi kpi-primary">
        <div class="t">稳定版用丝比</div>
        <div class="v" id="ratio">-</div>
        <div class="s">核心数据主结果</div>
      </div>
      
      <div class="kpi">
        <div class="t">编织夹角</div>
        <div class="v" id="angle">-</div>
        <div class="s">显示为 2 × 单丝角</div>
      </div>
      
      <div class="kpi">
        <div class="t">计算节距</div>
        <div class="v" id="pitchOut">-</div>
        <div class="s">Pitch (mm)</div>
      </div>
      
      <div class="kpi">
        <div class="t">理论用丝比</div>
        <div class="v" id="theory">-</div>
        <div class="s">1 / cos(单丝角)</div>
      </div>
      
      <div class="kpi">
        <div class="t">单股理论总用丝</div>
        <div class="v" id="single">-</div>
        <div class="s">单位: mm</div>
      </div>
      
      <div class="kpi">
        <div class="t">机台理论总用丝</div>
        <div class="v" id="total">-</div>
        <div class="s" style="color:#e11d48; font-weight:600;">已换算单位: 米 (m)</div>
      </div>
    </div>
  </div>

  <div class="card"><textarea id="preview"></textarea></div>
</div>

<script>
function v(id){return parseFloat(document.getElementById(id).value||0)}
function set(id,val){document.getElementById(id).textContent=val}
function craftText(c){return c==='1x1'?'一压一 (1x1)':c==='1x2'?'一压二 (1x2)':'二压二 (2x2)'}

function getPitchDivisor(craft) {
  if (craft === '1x1') return 4; 
  if (craft === '2x2') return 2; 
  if (craft === '1x2') return 2; 
  return 1;
}

function sync(source) {
  const sp = v('spindles') || 144;
  const D = v('mandrel') || 8;
  const craft = document.getElementById('craft').value;
  const divisor = getPitchDivisor(craft);
  
  if (source === 'ppi') {
     const p = v('ppi');
     if(p > 0) {
       const pitch = (sp / divisor) * (25.4 / p);
       document.getElementById('pitchIn').value = pitch.toFixed(2);
       let tanA = (Math.PI * D) / pitch;
       let angle = Math.atan(tanA) * 180 / Math.PI * 2;
       document.getElementById('angleIn').value = angle.toFixed(2);
     }
  } else if (source === 'pitch') {
     const pt = v('pitchIn');
     if(pt > 0) {
       const ppi = (sp / divisor) * (25.4 / pt);
       document.getElementById('ppi').value = ppi.toFixed(2);
       let tanA = (Math.PI * D) / pt;
       let angle = Math.atan(tanA) * 180 / Math.PI * 2;
       document.getElementById('angleIn').value = angle.toFixed(2);
     }
  } else if (source === 'angle') {
     const ang = v('angleIn');
     if(ang > 0 && ang < 180) {
       let tanA = Math.tan((ang / 2) * Math.PI / 180);
       if(tanA > 0) {
           const pitch = (Math.PI * D) / tanA;
           document.getElementById('pitchIn').value = pitch.toFixed(2);
           const ppi = (sp / divisor) * (25.4 / pitch);
           document.getElementById('ppi').value = ppi.toFixed(2);
       }
     }
  }
}

function singleAngle(D, ppi, sp, craft){
  let divisor = getPitchDivisor(craft);
  let pitch = (sp / divisor) * (25.4 / ppi);
  let tanA = (Math.PI * D) / pitch;
  return Math.atan(tanA) * 180 / Math.PI;
}

function braidAngle(D, ppi, sp, craft){ return singleAngle(D, ppi, sp, craft) * 2; }
function theoryRatio(D, ppi, sp, craft){ let angle = singleAngle(D, ppi, sp, craft) * Math.PI / 180; return 1 / Math.cos(angle); }
function stableRatio(sp, D, ppi, craft){ return theoryRatio(D, ppi, sp, craft); }

function calc(){
  const sp=v('spindles'),D=v('mandrel'),ppi=v('ppi'),len=v('length'),craft=document.getElementById('craft').value;
  
  const sAngle=singleAngle(D,ppi,sp,craft);
  const bAngle=braidAngle(D,ppi,sp,craft);
  const theo=theoryRatio(D,ppi,sp,craft);
  const ratio=stableRatio(sp,D,ppi,craft);
  
  const divisor = getPitchDivisor(craft);
  const pitch = (sp / divisor) * (25.4 / ppi);
  
  const single = ratio * len; 
  const totalMm = single * sp; 
  const totalM = totalMm / 1000; 
  
  set('ratio',ratio.toFixed(3));
  set('angle',bAngle.toFixed(2)+'°');
  set('pitchOut',pitch.toFixed(2));
  set('theory',theo.toFixed(3));
  set('single',single.toFixed(1));
  set('total',totalM.toFixed(2)+' m'); 
  buildPreview();
}

function buildPreview(){
 const sp=v('spindles'),D=v('mandrel'),d=v('wire'),ppi=v('ppi'),len=v('length'),craft=craftText(document.getElementById('craft').value);
 const ratio=document.getElementById('ratio').textContent, angle=document.getElementById('angle').textContent;
 const pitchOut=document.getElementById('pitchOut').textContent;
 const single=document.getElementById('single').textContent, total=document.getElementById('total').textContent;
 
 document.getElementById('preview').value = `【编织工艺参数参考】\n工艺：${craft}\n锭数：${sp} 锭\n芯棒直径：${D.toFixed(3)} mm\n丝径：${d.toFixed(3)} mm\n目数：${ppi} PPI\n节距：${pitchOut} mm\n成品长度：${len} mm\n\n计算结果：\n1、用丝比：${ratio}\n2、编织夹角：${angle}\n3、单股理论用丝：${single} mm\n4、机台理论总用丝：${total}`;
}

async function copyText(t){ const finalText=(t||'')+"\n\n—— WM开发"; try{ await navigator.clipboard.writeText(finalText); alert('已复制到剪贴板'); }catch(e){ console.error(e); alert('复制失败'); } }
function copyCustomer(){calc();buildPreview();copyText(document.getElementById('preview').value)}

sync('ppi');
calc();
</script>
<div class="footer-note">版权所有 © 王萌｜未经授权禁止商用或二次转发</div>
</body></html>
