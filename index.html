<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>编织工艺计算器｜V3.2 客户/工程双复制版</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#111;--muted:#666;--line:#e8e8ef}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text)}
.wrap{max-width:980px;margin:0 auto;padding:18px}
h1{font-size:30px;margin:0 0 6px} .sub{color:#666;font-size:14px;margin-bottom:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
.section{font-size:19px;font-weight:800;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
@media (max-width:700px){.grid{grid-template-columns:1fr}}
label{display:block;font-size:14px;color:#444;margin-bottom:6px}
input,select{width:100%;padding:13px 14px;border:1px solid #d8dbe6;border-radius:14px;font-size:16px;background:#fff}
.row{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:none;border-radius:14px;padding:13px 16px;background:#111;color:#fff;font-size:16px}
.btn2{border:none;border-radius:14px;padding:13px 16px;background:#eceff5;color:#111;font-size:16px}
.out{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
@media (max-width:700px){.out{grid-template-columns:1fr}}
.kpi{background:#fafbff;border:1px solid #eceef6;border-radius:16px;padding:14px}
.kpi .t{font-size:13px;color:#666;margin-bottom:6px}.kpi .v{font-size:28px;font-weight:800}
.small{font-size:12px;color:#777;line-height:1.6}
hr{border:none;border-top:1px solid var(--line);margin:14px 0}
textarea{width:100%;min-height:150px;padding:14px;border:1px solid #d8dbe6;border-radius:14px;font-size:15px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <h1>编织工艺计算器</h1>
  <div class="sub">V3.2 客户 / 工程双复制版｜统一按 <strong>芯棒直径</strong> 为基准</div>

  <div class="card">
    <div class="section">① 工艺输入</div>
    <div class="grid">
      <div>
        <label>锭数</label>
        <input id="spindles" type="number" value="24" />
      </div>
      <div>
        <label>工艺</label>
        <select id="craft">
          <option value="1x1">一压一</option>
          <option value="1x2" selected>一压二</option>
          <option value="2x2">二压二</option>
        </select>
      </div>
      <div>
        <label>芯棒直径 D（mm）</label>
        <input id="mandrel" type="number" step="0.001" value="2.00" />
      </div>
      <div>
        <label>PPI（每英寸编织点）</label>
        <input id="ppi" type="number" step="0.01" value="45" />
      </div>
      <div>
        <label>成品长度（mm）</label>
        <input id="length" type="number" step="0.1" value="100" />
      </div>
      <div>
        <label>丝径（mm，可选，用于覆盖率参考）</label>
        <input id="wire" type="number" step="0.001" value="0.05" />
      </div>
    </div>
    <div style="height:12px"></div>
    <div class="row">
      <button class="btn" onclick="calc()">计算</button>
      <button class="btn2" onclick="fillDemo()">填入演示值</button>
      <button class="btn2" onclick="copyCustomer()">复制给客户</button>
      <button class="btn2" onclick="copyEngineer()">复制工程版</button>
    </div>
  </div>

  <div class="card">
    <div class="section">② 正算结果</div>
    <div class="out">
      <div class="kpi"><div class="t">稳定版用丝比（主结果）</div><div class="v" id="ratio">-</div></div>
      <div class="kpi"><div class="t">理论编织角（参考）</div><div class="v" id="angle">-</div></div>
      <div class="kpi"><div class="t">理论覆盖率（参考）</div><div class="v" id="cover">-</div></div>
      <div class="kpi"><div class="t">每米单股理论用丝</div><div class="v" id="perMeter">-</div></div>
      <div class="kpi"><div class="t">单股总用丝</div><div class="v" id="singleTotal">-</div></div>
      <div class="kpi"><div class="t">机台理论总用丝</div><div class="v" id="machineTotal">-</div></div>
    </div>
  </div>

  <div class="card">
    <div class="section">③ 反推 PPI</div>
    <div class="grid">
      <div>
        <label>目标用丝比（主推荐反推）</label>
        <input id="targetRatio" type="number" step="0.001" value="1.60" />
      </div>
      <div>
        <label>目标编织角（°，参考反推）</label>
        <input id="targetAngle" type="number" step="0.01" value="55" />
      </div>
      <div>
        <label>目标覆盖率（%，参考反推）</label>
        <input id="targetCover" type="number" step="0.01" value="85" />
      </div>
    </div>
    <div style="height:12px"></div>
    <div class="row">
      <button class="btn" onclick="reverseCalc()">反推</button>
    </div>
    <hr>
    <div class="out">
      <div class="kpi"><div class="t">按目标用丝比反推 PPI</div><div class="v" id="r_ppi_ratio">-</div></div>
      <div class="kpi"><div class="t">按目标编织角反推 PPI</div><div class="v" id="r_ppi_angle">-</div></div>
      <div class="kpi"><div class="t">按目标覆盖率反推 PPI</div><div class="v" id="r_ppi_cover">-</div></div>
    </div>
  </div>

  <div class="card">
    <div class="section">④ 复制预览</div>
    <textarea id="preview"></textarea>
  </div>
</div>

<script>
function v(id){ return parseFloat(document.getElementById(id).value || 0); }
function set(id, txt){ document.getElementById(id).textContent = txt; }
function craftText(c){ return c==='1x1' ? '一压一' : c==='1x2' ? '一压二' : '二压二'; }

function craftFactor(craft){
  if(craft==='1x1') return 1.00;
  if(craft==='1x2') return 1.055;
  if(craft==='2x2') return 1.095;
  return 1.0;
}

function stableRatio(spindles, mandrel, ppi, craft){
  let base = 1 + (Math.PI * mandrel * ppi) / (25.4 * spindles);
  let spindleAdj = 1 + (24 - spindles) * 0.0025;
  if(spindleAdj < 0.90) spindleAdj = 0.90;
  if(spindleAdj > 1.12) spindleAdj = 1.12;
  return base * craftFactor(craft) * spindleAdj;
}

function calcAngle(mandrel, ppi, spindles){
  const C = Math.PI * mandrel;
  const pitch = 25.4 / ppi;
  const circumPerCarrier = C / (spindles/2);
  return Math.atan(circumPerCarrier / pitch) * 180 / Math.PI;
}

function calcCover(spindles, wire, mandrel, angle){
  if(!wire || !mandrel || !angle) return 0;
  const C = Math.PI * mandrel;
  const eff = spindles * wire / Math.sin(angle*Math.PI/180);
  return Math.min(99.9, Math.max(0, eff / C * 100));
}

function calc(){
  const sp = v('spindles');
  const mandrel = v('mandrel');
  const ppi = v('ppi');
  const len = v('length');
  const wire = v('wire');
  const craft = document.getElementById('craft').value;

  const ratio = stableRatio(sp, mandrel, ppi, craft);
  const angle = calcAngle(mandrel, ppi, sp);
  const cover = calcCover(sp, wire, mandrel, angle);

  const singleTotal = ratio * len;
  const machineTotal = singleTotal * sp;
  const perMeter = ratio * 1000;

  set('ratio', ratio.toFixed(3));
  set('angle', angle.toFixed(1) + '°');
  set('cover', cover.toFixed(1) + '%');
  set('perMeter', perMeter.toFixed(0) + ' mm');
  set('singleTotal', singleTotal.toFixed(1) + ' mm');
  set('machineTotal', machineTotal.toFixed(1) + ' mm');

  buildCustomerText();
}

function reverseCalc(){
  const sp = v('spindles');
  const mandrel = v('mandrel');
  const wire = v('wire');
  const craft = document.getElementById('craft').value;
  const tr = v('targetRatio');
  const ta = v('targetAngle');
  const tc = v('targetCover');

  let spindleAdj = 1 + (24 - sp) * 0.0025;
  if(spindleAdj < 0.90) spindleAdj = 0.90;
  if(spindleAdj > 1.12) spindleAdj = 1.12;

  let ppi_ratio = ((tr / (craftFactor(craft) * spindleAdj)) - 1) * (25.4 * sp) / (Math.PI * mandrel);
  if(!isFinite(ppi_ratio) || ppi_ratio < 0) ppi_ratio = 0;

  let pitch = (Math.PI * mandrel / (sp/2)) / Math.tan(ta*Math.PI/180);
  let ppi_angle = pitch > 0 ? 25.4 / pitch : 0;

  let ppi_cover = 0;
  if(tc>0 && wire>0 && mandrel>0){
    const angleFromCover = Math.asin(Math.min(0.999, (sp*wire) / ((tc/100) * Math.PI * mandrel)));
    const pitch2 = (Math.PI * mandrel / (sp/2)) / Math.tan(angleFromCover);
    ppi_cover = pitch2 > 0 ? 25.4 / pitch2 : 0;
  }

  set('r_ppi_ratio', ppi_ratio.toFixed(2));
  set('r_ppi_angle', ppi_angle.toFixed(2));
  set('r_ppi_cover', ppi_cover.toFixed(2));

  buildCustomerText();
}

function buildCustomerText(){
  const sp = v('spindles');
  const mandrel = v('mandrel');
  const ppi = v('ppi');
  const len = v('length');
  const craft = document.getElementById('craft').value;
  const ratio = document.getElementById('ratio').textContent;
  const angle = document.getElementById('angle').textContent;
  const cover = document.getElementById('cover').textContent;
  const singleTotal = document.getElementById('singleTotal').textContent;
  const machineTotal = document.getElementById('machineTotal').textContent;

  document.getElementById('preview').value =
`【编织工艺参数参考】

工艺：${craftText(craft)}
锭数：${sp}锭
芯棒直径：${mandrel.toFixed(3)} mm
PPI：${ppi}
成品长度：${len} mm

计算结果（按单股）：
1、用丝比：${ratio}
2、单股理论用丝：${singleTotal}
3、机台理论总用丝：${machineTotal}
4、编织角度（参考）：${angle}
5、覆盖率（参考）：${cover}

说明：
以上为工艺计算参考值，实际生产中可根据材料、张力、编织点位置等因素微调。`;
}

async function copyText(text){
  try{
    await navigator.clipboard.writeText(text);
    alert('已复制');
  }catch(e){
    const ta = document.getElementById('preview');
    ta.value = text;
    ta.select();
    document.execCommand('copy');
    alert('已复制');
  }
}

function copyCustomer(){
  calc(); reverseCalc();
  const text = document.getElementById('preview').value;
  copyText(text);
}

function copyEngineer(){
  calc(); reverseCalc();
  const sp = v('spindles');
  const mandrel = v('mandrel');
  const ppi = v('ppi');
  const len = v('length');
  const wire = v('wire');
  const craft = document.getElementById('craft').value;
  const ratio = document.getElementById('ratio').textContent;
  const angle = document.getElementById('angle').textContent;
  const cover = document.getElementById('cover').textContent;
  const singleTotal = document.getElementById('singleTotal').textContent;
  const machineTotal = document.getElementById('machineTotal').textContent;
  const p1 = document.getElementById('r_ppi_ratio').textContent;
  const p2 = document.getElementById('r_ppi_angle').textContent;
  const p3 = document.getElementById('r_ppi_cover').textContent;

  const text =
`【编织工艺工程计算】

工艺：${craftText(craft)}
锭数：${sp}锭
芯棒直径：${mandrel.toFixed(3)} mm
PPI：${ppi}
成品长度：${len} mm
丝径：${wire.toFixed(3)} mm

正算结果：
1、稳定版用丝比：${ratio}
2、理论编织角：${angle}
3、理论覆盖率：${cover}
4、单股理论总用丝：${singleTotal}
5、机台理论总用丝：${machineTotal}

反推结果：
1、按目标用丝比反推 PPI：${p1}
2、按目标编织角反推 PPI：${p2}
3、按目标覆盖率反推 PPI：${p3}

备注：
本版统一按芯棒直径为计算基准，用丝比优先采用稳定经验算法，贴近现场估丝/估PPI使用。`;

  document.getElementById('preview').value = text;
  copyText(text);
}

function fillDemo(){
  document.getElementById('spindles').value = 24;
  document.getElementById('craft').value = '1x2';
  document.getElementById('mandrel').value = 2.00;
  document.getElementById('ppi').value = 45;
  document.getElementById('length').value = 100;
  document.getElementById('wire').value = 0.05;
  document.getElementById('targetRatio').value = 1.60;
  document.getElementById('targetAngle').value = 55;
  document.getElementById('targetCover').value = 85;
  calc(); reverseCalc();
}
fillDemo();
</script>
</body>
</html>
