<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>编织工艺计算器</title>
<style>
:root{--bg:#f6f8fc;--card:#fff;--line:#e5eaf2;--text:#0f172a;--muted:#64748b;--pri:#22c55e}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
/* 修改了这里：将 repeat(3, ...) 改为 repeat(2, ...) 实现一行两个 */
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.out{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
@media (max-width:700px){.grid,.out{grid-template-columns:1fr}}
input,select,textarea{width:100%;padding:13px 14px;border-radius:14px;border:1px solid #d7dee8;background:#fff;color:var(--text);font-size:16px; transition: border 0.2s;}
input:focus, select:focus {outline: none; border-color: var(--pri);}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}.row{display:flex;gap:10px;flex-wrap:wrap}
.btn,.btn2{border:none;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:700; cursor: pointer; transition: opacity 0.2s;}.btn:hover,.btn2:hover{opacity:0.8}
.btn{background:var(--pri);color:#06110a}.btn2{background:#eef2f7}
.kpi{background:#fff;border:1px solid #e5eaf2;border-radius:18px;padding:14px}.kpi .t{font-size:12px;color:var(--muted)}.kpi .v{font-size:28px;font-weight:900}.kpi .s{font-size:12px;color:#2563eb;margin-top:6px}
textarea{min-height:220px; line-height: 1.5;}
.auth-wrap{position:fixed;inset:0;background:linear-gradient(180deg,#f6f8fc,#eef3f9);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
.auth-card{max-width:460px;width:100%;background:#fff;border:1px solid #e5eaf2;border-radius:20px;padding:22px}
.auth-title{font-size:28px;font-weight:800;margin-bottom:8px}.auth-sub{color:#64748b;font-size:14px;line-height:1.8;margin-bottom:14px}.auth-tip{font-size:12px;color:#64748b;margin-top:10px}
.footer-note{color:#64748b;font-size:12px;text-align:center;padding:8px 0 24px}
</style>
</head>
<body>
<div id="authGate" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">编织工艺计算器</div>
    <div class="auth-sub">请输入授权码后使用。授权通过后，本机将自动记住有效期。</div>
    <label>授权码</label>
    <input id="authCode" type="password" placeholder="请输入授权码">
    <div style="height:12px"></div>
    <button class="btn" style="width:100%" onclick="verifyAccess()">进入工具</button>
    <div id="authMsg" class="auth-tip">仅授权用户可使用，未经允许禁止外传。</div>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <h1 style="margin:0 0 6px">编织工艺计算器</h1>
    <div style="color:#64748b; line-height: 1.6;">
      V2.9版本，新增编织角反推，结果看板双列布局。<br>
      <span style="color:#2563eb; font-weight: 500;">由王萌开发｜仅内部授权使用</span>
    </div>
  </div>

  <div class="card">
    <div class="grid">
      <div><label>锭数</label><input id="spindles" type="number" value="144" oninput="sync('ppi')"></div>
      <div><label>工艺</label><select id="craft" onchange="sync('ppi')"><option value="1x1">一压一</option><option value="1x2" selected>一压二</option><option value="2x2">二压二</option></select></div>
      <div><label>芯棒直径 D（mm）</label><input id="mandrel" type="number" step="0.001" value="8" oninput="sync('ppi')"></div>
      <div><label>丝径 d（mm）</label><input id="wire" type="number" step="0.001" value="0.03"></div>
      
      <div><label>PPI（正算基准）</label><input id="ppi" type="number" step="0.01" value="55" oninput="sync('ppi')"></div>
      <div><label>节距 Pitch (mm)（输入反推）</label><input id="pitchIn" type="number" step="0.01" value="" style="background:#f0fdf4; border-color:#86efac;" oninput="sync('pitch')"></div>
      <div><label>编织夹角 (°)（输入反推）</label><input id="angleIn" type="number" step="0.01" value="" style="background:#e0f2fe; border-color:#7dd3fc;" oninput="sync('angle')"></div>
      
      <div><label>成品长度（mm）</label><input id="length" type="number" step="0.1" value="400000"></div>
    </div>
    <div style="height:12px"></div>
    <div class="row">
      <button class="btn" onclick="calc()">计算结果</button>
      <button class="btn2" onclick="copyCustomer()">复制给客户</button>
      <button class="btn2" onclick="copyEngineer()">复制工程版</button>
    </div>
  </div>

  <div class="card">
    <div class="out">
      <div class="kpi"><div class="t">稳定版用丝比</div><div class="v" id="ratio">-</div><div class="s">主结果</div></div>
      <div class="kpi"><div class="t">编织夹角</div><div class="v" id="angle">-</div><div class="s">显示为 2×单丝角</div></div>
      <div class="kpi"><div class="t">计算节距</div><div class="v" id="pitchOut">-</div><div class="s">Pitch (mm)</div></div>
      <div class="kpi"><div class="t">理论用丝比</div><div class="v" id="theory">-</div><div class="s">1 / cos(单丝角)</div></div>
      <div class="kpi"><div class="t">单股理论总用丝</div><div class="v" id="single">-</div><div class="s">单位: mm</div></div>
      <div class="kpi"><div class="t">机台理论总用丝</div><div class="v" id="total">-</div><div class="s" style="color:#e11d48; font-weight:bold;">已转换为：米 (m)</div></div>
    </div>
  </div>

  <div class="card"><textarea id="preview"></textarea></div>
</div>

<script>
const AUTH_CODES = {"WM-NEIBU": {name:"内部", days:3650}};
const AUTH_KEY = "braid_tool_auth_v29";
function formatExpire(ts){ const d=new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function verifyAccess(){ const code=(document.getElementById('authCode').value||'').trim(); const msg=document.getElementById('authMsg'); if(AUTH_CODES[code]){ const cfg=AUTH_CODES[code]; const expireAt=Date.now()+(cfg.days||7)*24*60*60*1000; localStorage.setItem(AUTH_KEY, JSON.stringify({code,name:cfg.name,expireAt})); document.getElementById('authGate').style.display='none'; alert(`授权成功\n用户：${cfg.name}\n有效期至：${formatExpire(expireAt)}`);} else { msg.textContent='授权码错误，请重新输入'; } }
(function initAccess(){ try{ const raw=localStorage.getItem(AUTH_KEY); if(raw){ const data=JSON.parse(raw); if(data && data.expireAt && Date.now()<data.expireAt){ document.getElementById('authGate').style.display='none'; } else { localStorage.removeItem(AUTH_KEY); } } }catch(e){} })();

function v(id){return parseFloat(document.getElementById(id).value||0)}
function set(id,val){document.getElementById(id).textContent=val}
function craftText(c){return c==='1x1'?'一压一':c==='1x2'?'一压二':'二压二'}

// 获取不同工艺对应的节距系数(Divisor)
function getPitchDivisor(craft) {
  if (craft === '1x1') return 4; 
  if (craft === '2x2') return 2; 
  if (craft === '1x2') return 2; 
  return 1;
}

// PPI、节距、角度 三向联动反推核心逻辑
function sync(source) {
  const sp = v('spindles') || 144;
  const D = v('mandrel') || 8;
  const craft = document.getElementById('craft').value;
  const divisor = getPitchDivisor(craft);
  
  if (source === 'ppi') {
     const p = v('ppi');
     if(p > 0) {
       // 推节距
       const pitch = (sp / divisor) * (25.4 / p);
       document.getElementById('pitchIn').value = pitch.toFixed(2);
       // 推角度
       let tanA = (Math.PI * D) / pitch;
       let angle = Math.atan(tanA) * 180 / Math.PI * 2;
       document.getElementById('angleIn').value = angle.toFixed(2);
     }
  } else if (source === 'pitch') {
     const pt = v('pitchIn');
     if(pt > 0) {
       // 推PPI
       const ppi = (sp / divisor) * (25.4 / pt);
       document.getElementById('ppi').value = ppi.toFixed(2);
       // 推角度
       let tanA = (Math.PI * D) / pt;
       let angle = Math.atan(tanA) * 180 / Math.PI * 2;
       document.getElementById('angleIn').value = angle.toFixed(2);
     }
  } else if (source === 'angle') {
     const ang = v('angleIn');
     if(ang > 0 && ang < 180) {
       let tanA = Math.tan((ang / 2) * Math.PI / 180);
       if(tanA > 0) {
           // 推节距
           const pitch = (Math.PI * D) / tanA;
           document.getElementById('pitchIn').value = pitch.toFixed(2);
           // 推PPI
           const ppi = (sp / divisor) * (25.4 / pitch);
           document.getElementById('ppi').value = ppi.toFixed(2);
       }
     }
  }
}

// 单丝角（内部真实计算角）
function singleAngle(D, ppi, sp, craft){
  let divisor = getPitchDivisor(craft);
  let pitch = (sp / divisor) * (25.4 / ppi);
  let tanA = (Math.PI * D) / pitch;
  return Math.atan(tanA) * 180 / Math.PI;
}

// 编织夹角（页面显示角）
function braidAngle(D, ppi, sp, craft){
  return singleAngle(D, ppi, sp, craft) * 2;
}

// 理论用丝比
function theoryRatio(D, ppi, sp, craft){
  let angle = singleAngle(D, ppi, sp, craft) * Math.PI / 180;
  return 1 / Math.cos(angle);
}

// 稳定版用丝比
function stableRatio(sp, D, ppi, craft){
  let base = theoryRatio(D, ppi, sp, craft);
  return base;
}

function calc(){
  const sp=v('spindles'),D=v('mandrel'),ppi=v('ppi'),len=v('length'),craft=document.getElementById('craft').value;
  
  const sAngle=singleAngle(D,ppi,sp,craft);
  const bAngle=braidAngle(D,ppi,sp,craft);
  const theo=theoryRatio(D,ppi,sp,craft);
  const ratio=stableRatio(sp,D,ppi,craft);
  
  // 节距计算用于展示
  const divisor = getPitchDivisor(craft);
  const pitch = (sp / divisor) * (25.4 / ppi);
  
  // 用丝长度计算
  const single = ratio * len; // mm
  const totalMm = single * sp; // mm
  const totalM = totalMm / 1000; // 转换为米 (m)
  
  set('ratio',ratio.toFixed(3));
  set('angle',bAngle.toFixed(2)+'°');
  set('pitchOut',pitch.toFixed(2));
  set('theory',theo.toFixed(3));
  set('single',single.toFixed(1));
  set('total',totalM.toFixed(2)+' m'); // 显示为米
  buildPreview('customer');
}

function buildPreview(mode){
 const sp=v('spindles'),D=v('mandrel'),d=v('wire'),ppi=v('ppi'),len=v('length'),craft=craftText(document.getElementById('craft').value);
 const ratio=document.getElementById('ratio').textContent, angle=document.getElementById('angle').textContent, theo=document.getElementById('theory').textContent;
 const pitchOut=document.getElementById('pitchOut').textContent;
 const single=document.getElementById('single').textContent, total=document.getElementById('total').textContent;
 
 document.getElementById('preview').value = mode==='engineer' ? 
`【编织工艺工程计算】
工艺：${craft}
锭数：${sp} 锭
芯棒直径：${D.toFixed(3)} mm
丝径：${d.toFixed(3)} mm
目数：${ppi} PPI
节距：${pitchOut} mm
成品长度：${len} mm

正算结果：
1、稳定版用丝比：${ratio}
2、编织夹角：${angle}
3、理论用丝比：${theo}
4、单股理论总用丝：${single} mm
5、机台理论总用丝：${total}

工程说明：此用丝比基于不同工艺的专属几何结构运算得出。机台总用丝单位已自动换算为米 (m)。` :

`【编织工艺参数参考】
工艺：${craft}
锭数：${sp} 锭
芯棒直径：${D.toFixed(3)} mm
丝径：${d.toFixed(3)} mm
目数：${ppi} PPI
节距：${pitchOut} mm
成品长度：${len} mm

计算结果：
1、用丝比：${ratio}
2、编织夹角：${angle}
3、单股理论用丝：${single} mm
4、机台理论总用丝：${total}`;
}

async function copyText(t){ const finalText=(t||'')+"\n\n—— 王萌开发｜内部授权使用"; try{ await navigator.clipboard.writeText(finalText); alert('已复制'); }catch(e){ const ta=document.getElementById('preview'); ta.value=finalText; ta.select(); document.execCommand('copy'); alert('已复制'); } }
function copyCustomer(){calc();buildPreview('customer');copyText(document.getElementById('preview').value)}
function copyEngineer(){calc();buildPreview('engineer');copyText(document.getElementById('preview').value)}

// 初始化时自动推算一次节距并计算全盘数据
sync('ppi');
calc();
</script>
<div class="footer-note">© 恒辉王萌编织工艺工具｜仅授权用户内部使用，未经允许禁止外传。</div>
</body></html>
