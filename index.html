<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>编织工艺计算器｜V3.6 完整稳定版</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#111;--muted:#666;--line:#e8e8ef}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text)}
.wrap{max-width:980px;margin:0 auto;padding:18px}
h1{font-size:30px;margin:0 0 6px}.sub{color:#666;font-size:14px;margin-bottom:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
.section{font-size:19px;font-weight:800;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
@media (max-width:700px){.grid,.out{grid-template-columns:1fr}}
label{display:block;font-size:14px;color:#444;margin-bottom:6px}
input,select,textarea{width:100%;padding:13px 14px;border:1px solid #d8dbe6;border-radius:14px;font-size:16px;background:#fff}
.row{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:none;border-radius:14px;padding:13px 16px;background:#111;color:#fff;font-size:16px}
.btn2{border:none;border-radius:14px;padding:13px 16px;background:#eceff5;color:#111;font-size:16px}
.out{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.kpi{background:#fafbff;border:1px solid #eceef6;border-radius:16px;padding:14px}
.kpi .t{font-size:13px;color:#666;margin-bottom:6px}.kpi .v{font-size:28px;font-weight:800}
.small{font-size:12px;color:#777;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <h1>编织工艺计算器</h1>
  <div class="sub">V3.6 完整稳定版｜用丝比稳定、编织角按芯棒+丝径、反推已恢复</div>

  <div class="card">
    <div class="section">① 工艺输入</div>
    <div class="grid">
      <div><label>锭数</label><input id="spindles" type="number" value="24"></div>
      <div><label>工艺</label>
        <select id="craft">
          <option value="1x1">一压一</option>
          <option value="1x2" selected>一压二</option>
          <option value="2x2">二压二</option>
        </select>
      </div>
      <div><label>芯棒直径 D（mm）</label><input id="mandrel" type="number" step="0.001" value="2.00"></div>
      <div><label>丝径 d（mm）</label><input id="wire" type="number" step="0.001" value="0.05"></div>
      <div><label>PPI（每英寸编织点）</label><input id="ppi" type="number" step="0.01" value="45"></div>
      <div><label>成品长度（mm）</label><input id="length" type="number" step="0.1" value="100"></div>
    </div>
    <div style="height:12px"></div>
    <div class="row">
      <button class="btn" onclick="calc()">计算</button>
      <button class="btn2" onclick="fillDemo()">填入演示值</button>
      <button class="btn2" onclick="copyCustomer()">复制给客户</button>
      <button class="btn2" onclick="copyEngineer()">复制工程版</button>
    </div>
  </div>

  <div class="card">
    <div class="section">② 正算结果</div>
    <div class="out">
      <div class="kpi"><div class="t">稳定版用丝比（主结果）</div><div class="v" id="ratio">-</div></div>
      <div class="kpi"><div class="t">编织角（芯棒+丝径）</div><div class="v" id="angle">-</div></div>
      <div class="kpi"><div class="t">覆盖率（参考）</div><div class="v" id="cover">-</div></div>
      <div class="kpi"><div class="t">每米单股理论用丝</div><div class="v" id="perMeter">-</div></div>
      <div class="kpi"><div class="t">单股总用丝</div><div class="v" id="single">-</div></div>
      <div class="kpi"><div class="t">机台总用丝</div><div class="v" id="total">-</div></div>
    </div>
  </div>

  <div class="card">
    <div class="section">③ 反推 PPI</div>
    <div class="grid">
      <div><label>目标用丝比（⭐推荐）</label><input id="targetRatio" type="number" step="0.001" value="1.60"></div>
      <div><label>目标编织角（°，参考）</label><input id="targetAngle" type="number" step="0.01" value="55"></div>
      <div><label>目标覆盖率（%，辅助）</label><input id="targetCover" type="number" step="0.01" value="85"></div>
    </div>
    <div style="height:12px"></div>
    <div class="row"><button class="btn" onclick="reverseCalc()">反推</button></div>
    <div style="height:12px"></div>
    <div class="out">
      <div class="kpi"><div class="t">按目标用丝比反推 PPI</div><div class="v" id="r_ppi_ratio">-</div></div>
      <div class="kpi"><div class="t">按目标编织角反推 PPI</div><div class="v" id="r_ppi_angle">-</div></div>
      <div class="kpi"><div class="t">按目标覆盖率反推 PPI</div><div class="v" id="r_ppi_cover">-</div></div>
    </div>
    <div class="small" style="margin-top:10px">
      推荐优先级：<strong>用丝比反推 ＞ 编织角反推 ＞ 覆盖率反推</strong>
    </div>
  </div>

  <div class="card">
    <div class="section">④ 复制预览</div>
    <textarea id="preview" rows="10"></textarea>
  </div>
</div>

<script>
function v(id){return parseFloat(document.getElementById(id).value||0);}
function set(id,val){document.getElementById(id).textContent=val;}
function craftText(c){return c==='1x1'?'一压一':c==='1x2'?'一压二':'二压二';}

function craftFactor(c){
  if(c==='1x1') return 1.000;
  if(c==='1x2') return 1.055;
  if(c==='2x2') return 1.095;
  return 1.0;
}
function spindleAdj(sp){
  let s = 1 + (24-sp)*0.0025;
  if(s<0.90) s=0.90;
  if(s>1.12) s=1.12;
  return s;
}

// 稳定版用丝比（保持之前逻辑）
function stableRatio(sp,D,ppi,craft){
  return (1 + (Math.PI*D*ppi)/(25.4*sp)) * craftFactor(craft) * spindleAdj(sp);
}

// 编织角：按 芯棒 + 丝径 + PPI
function braidAngle(D,d,ppi){
  const Deff = D + d;
  return Math.atan((Math.PI*Deff*ppi)/25.4) * 180 / Math.PI;
}

// 覆盖率：参考值
function coverRate(sp,D,d,angleDeg){
  const C = Math.PI*(D+d);
  const angle = angleDeg*Math.PI/180;
  if(C<=0 || d<=0 || angle<=0) return 0;
  const eff = sp*d/Math.sin(angle);
  return Math.min(99.9, Math.max(0, eff/C*100));
}

function calc(){
  const sp=v('spindles'), D=v('mandrel'), d=v('wire'), ppi=v('ppi'), len=v('length');
  const craft=document.getElementById('craft').value;

  const ratio=stableRatio(sp,D,ppi,craft);
  const angle=braidAngle(D,d,ppi);
  const cover=coverRate(sp,D,d,angle);
  const single=ratio*len;
  const total=single*sp;
  const perMeter=ratio*1000;

  set('ratio', ratio.toFixed(3));
  set('angle', angle.toFixed(1)+'°');
  set('cover', cover.toFixed(1)+'%');
  set('single', single.toFixed(1)+' mm');
  set('total', total.toFixed(1)+' mm');
  set('perMeter', perMeter.toFixed(0)+' mm');

  buildPreview();
}

function reverseCalc(){
  const sp=v('spindles'), D=v('mandrel'), d=v('wire');
  const craft=document.getElementById('craft').value;
  const tr=v('targetRatio'), ta=v('targetAngle'), tc=v('targetCover');

  // 1) 按目标用丝比反推 PPI（主推荐）
  let ppi_ratio = ((tr/(craftFactor(craft)*spindleAdj(sp))) - 1) * (25.4*sp)/(Math.PI*D);
  if(!isFinite(ppi_ratio) || ppi_ratio<0) ppi_ratio=0;

  // 2) 按目标编织角反推 PPI（按 芯棒+丝径 反解）
  let ppi_angle = Math.tan(ta*Math.PI/180) * 25.4 / (Math.PI*(D+d));
  if(!isFinite(ppi_angle) || ppi_angle<0) ppi_angle=0;

  // 3) 按目标覆盖率反推 PPI（辅助）
  let ppi_cover = 0;
  if(tc>0 && sp>0 && d>0 && D>0){
    const C = Math.PI*(D+d);
    const sinA = Math.min(0.999, (sp*d)/((tc/100)*C));
    if(sinA>0){
      const angle = Math.asin(sinA);
      ppi_cover = Math.tan(angle) * 25.4 / (Math.PI*(D+d));
    }
  }
  if(!isFinite(ppi_cover) || ppi_cover<0) ppi_cover=0;

  set('r_ppi_ratio', ppi_ratio.toFixed(2));
  set('r_ppi_angle', ppi_angle.toFixed(2));
  set('r_ppi_cover', ppi_cover.toFixed(2));

  buildPreview();
}

function buildPreview(){
  const sp=v('spindles'), D=v('mandrel'), d=v('wire'), ppi=v('ppi'), len=v('length');
  const craft=craftText(document.getElementById('craft').value);
  const ratio=document.getElementById('ratio').textContent;
  const angle=document.getElementById('angle').textContent;
  const cover=document.getElementById('cover').textContent;
  const single=document.getElementById('single').textContent;
  const total=document.getElementById('total').textContent;
  const p1=document.getElementById('r_ppi_ratio').textContent;
  const p2=document.getElementById('r_ppi_angle').textContent;
  const p3=document.getElementById('r_ppi_cover').textContent;

  document.getElementById('preview').value =
`【编织工艺参数参考】

工艺：${craft}
锭数：${sp}锭
芯棒直径：${D.toFixed(3)} mm
丝径：${d.toFixed(3)} mm
PPI：${ppi}
成品长度：${len} mm

正算结果：
1、用丝比：${ratio}
2、编织角：${angle}
3、覆盖率（参考）：${cover}
4、单股理论用丝：${single}
5、机台理论总用丝：${total}

反推结果：
1、按目标用丝比反推 PPI：${p1}
2、按目标编织角反推 PPI：${p2}
3、按目标覆盖率反推 PPI：${p3}`;
}

async function copyText(t){
  try{ await navigator.clipboard.writeText(t); alert('已复制'); }
  catch(e){
    const ta=document.getElementById('preview'); ta.select(); document.execCommand('copy'); alert('已复制');
  }
}
function copyCustomer(){ calc(); reverseCalc(); copyText(document.getElementById('preview').value); }
function copyEngineer(){ calc(); reverseCalc(); copyText(document.getElementById('preview').value); }

function fillDemo(){
  document.getElementById('spindles').value=24;
  document.getElementById('craft').value='1x2';
  document.getElementById('mandrel').value=2.00;
  document.getElementById('wire').value=0.05;
  document.getElementById('ppi').value=45;
  document.getElementById('length').value=100;
  document.getElementById('targetRatio').value=1.60;
  document.getElementById('targetAngle').value=55;
  document.getElementById('targetCover').value=85;
  calc(); reverseCalc();
}
fillDemo();
</script>
</body>
</html>
